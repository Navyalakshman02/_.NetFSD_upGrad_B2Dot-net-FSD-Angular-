<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        li { margin: 5px 0; }
        .completed { text-decoration: line-through; color: gray; }
        .delete { margin-left: 10px; color: red; cursor: pointer; }
    </style>
</head>
<body>

<h2>To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter new task">
<button id="addTask">Add</button>

<h4>Total Tasks: <span id="totalCount">0</span></h4>
<h4>Completed Tasks: <span id="completedCount">0</span></h4>

<ul id="taskList"></ul>

<script>
$(document).ready(function(){

    function updateCounts(){
        $("#totalCount").text($("#taskList li").length);
        $("#completedCount").text($("#taskList li.completed").length);
    }

    $("#addTask").click(function(){
        var task = $("#taskInput").val().trim();
        if(task !== ""){
            $("#taskList").append(
                "<li>" + task +
                " <button class='complete'>Complete</button>" +
                " <span class='delete'>Delete</span></li>"
            );
            $("#taskInput").val("");
            updateCounts();
        }
    });

    $("#taskList").on("click", ".complete", function(){
        $(this).parent().toggleClass("completed");
        updateCounts();
    });

    $("#taskList").on("click", ".delete", function(){
        $(this).parent().remove();
        updateCounts();
    });

});
</script>

</body>
</html>
